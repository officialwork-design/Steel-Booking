<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>スチール予約</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background:#f5f6f8; }
  .wrap { max-width: 480px; }
  .btn-line { background:#06c755; border-color:#06c755; color:#fff; }
  .btn-line:hover { background:#05b34c; border-color:#05b34c; color:#fff; }
  .avatar { width:44px; height:44px; object-fit:cover; }
  .slot-btn { text-align:left; }
  .slot-btn.active { background:#06c755; border-color:#06c755; color:#fff; }
  .rules { white-space:pre-wrap; font-size:.9rem; }
</style>
</head>
<body>
<div class="wrap container py-4">
  <h1 class="h4 fw-bold mb-3">スチール予約</h1>

  <div id="status" class="alert alert-secondary py-2 px-3 mb-3" style="white-space:pre-wrap;">読み込み中…</div>

  <div id="profile" class="d-none align-items-center gap-2 mb-3">
    <img id="avatar" class="avatar rounded-circle" alt="">
    <div>
      <div class="fw-semibold" id="dispName"></div>
      <div class="text-muted small" id="dispSub"></div>
    </div>
  </div>

  <!-- 管理者用 -->
  <div id="adminBar" class="d-none mb-3">
    <button id="adminBtn" class="btn btn-dark btn-sm w-100">🔧 管理画面を開く</button>
  </div>

  <!-- ルール -->
  <div id="rulesCard" class="card border-0 shadow-sm mb-3 d-none">
    <div class="card-body">
      <div class="fw-semibold mb-2">📋 ルール・注意事項</div>
      <div id="rules" class="rules text-body-secondary"></div>
    </div>
  </div>

  <!-- 現在の予約 -->
  <div id="currentCard" class="card border-0 shadow-sm mb-3 d-none">
    <div class="card-body">
      <div class="fw-semibold mb-2">✅ あなたの予約</div>
      <div id="currentInfo" class="mb-2"></div>
      <button id="editBtn" class="btn btn-outline-secondary btn-sm">予約を変更する</button>
      <button id="cancelBtn" class="btn btn-outline-danger btn-sm ms-1">取り消す</button>
    </div>
  </div>

  <!-- 予約フォーム -->
  <form id="bookingForm" class="d-none card border-0 shadow-sm">
    <div class="card-body">
      <div id="formTitle" class="fw-semibold mb-2">予約枠を選択</div>
      <label class="form-label small text-muted">日時 <span class="text-danger">*</span></label>
      <div id="slots" class="d-grid gap-2 mb-3"></div>
      <div id="noSlots" class="text-muted small d-none mb-3">現在、予約できる空き枠がありません。</div>

      <label for="remarks" class="form-label fw-semibold">備考</label>
      <textarea id="remarks" class="form-control mb-3" rows="3" placeholder="ご要望・連絡事項など"></textarea>

      <button id="submitBtn" type="submit" class="btn btn-line w-100 py-2 fw-semibold" disabled>この内容で予約する</button>
      <div id="result" class="mt-3 small"></div>
    </div>
  </form>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  // ▼▼▼ 書き換えるのはこの2つだけ ▼▼▼
  const CONFIG = {
    LIFF_ID: "2010792348-o9YZUyTV",
    GAS_ENDPOINT: "https://script.google.com/macros/s/AKfycbzCZMp7K4BcvoL4Jxd1SC1aB1LXtWT2eSbONSokii6mXVLUfIAMIkWPVI4-Fb7PPsWw7A/exec"
  };
  // ▲▲▲ ここだけ ▲▲▲

  const $ = (id) => document.getElementById(id);
  const setStatus = (msg, kind) => {
    const el = $("status");
    el.textContent = msg;
    el.className = "alert py-2 px-3 mb-3 " +
      (kind === "ok" ? "alert-success" : kind === "err" ? "alert-danger" : "alert-secondary");
    el.style.whiteSpace = "pre-wrap";
  };
  const wdays = ["日","月","火","水","木","金","土"];
  const fmtDate = (d) => {
    const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(d);
    if (!m) return d;
    const dt = new Date(+m[1], +m[2]-1, +m[3]);
    return `${+m[2]}/${+m[3]}(${wdays[dt.getDay()]})`;
  };

  let PROFILE = null, STATE = null, selectedSlot = null;

  async function api(payload) {
    const res = await fetch(CONFIG.GAS_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  async function main() {
    try {
      setStatus("LIFF 初期化中…");
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (!liff.isLoggedIn()) {
        setStatus("LINEログインへ移動します…");
        liff.login({ redirectUri: window.location.origin + window.location.pathname });
        return;
      }
      PROFILE = await liff.getProfile();
      $("avatar").src = PROFILE.pictureUrl || "";
      await refresh();
    } catch (e) {
      setStatus("初期化エラー:\n" + (e && e.message ? e.message : e), "err");
    }
  }

  async function refresh() {
    setStatus("読み込み中…");
    const data = await api({ action: "init", userId: PROFILE.userId, idToken: liff.getIDToken() });
    if (!data.ok) { setStatus("エラー: " + (data.error || "不明"), "err"); return; }
    STATE = data;

    // ルール表示
    if (data.rules) { $("rules").textContent = data.rules; $("rulesCard").classList.remove("d-none"); }

    if (!data.registered) {
      $("dispName").textContent = PROFILE.displayName || "";
      $("dispSub").textContent = "未登録";
      $("profile").classList.remove("d-none"); $("profile").classList.add("d-flex");
      setStatus("あなたはまだ予約できる状態ではありません。\n下のユーザーIDを管理者に伝えて登録を依頼してください。\n\nユーザーID: " + PROFILE.userId, "err");
      return;
    }

    // 登録済み
    $("dispName").textContent = data.name || PROFILE.displayName || "";
    $("dispSub").textContent = data.isAdmin ? "登録済み（管理者）" : "登録済み";
    $("profile").classList.remove("d-none"); $("profile").classList.add("d-flex");
    if (data.isAdmin) $("adminBar").classList.remove("d-none");

    if (data.myReservation) {
      showCurrent(data.myReservation);
      setStatus("予約済みです。内容は下のとおりです。", "ok");
    } else {
      setStatus("下の枠から選んで予約してください。", "ok");
      showForm(false, null);
    }
  }

  function showCurrent(r) {
    $("currentInfo").innerHTML =
      `<div class="fs-5 fw-bold">${fmtDate(r.date)} ${r.time}</div>` +
      (r.remarks ? `<div class="text-muted small mt-1">備考: ${escapeHtml(r.remarks)}</div>` : "") +
      `<div class="mt-1"><span class="badge text-bg-success">${escapeHtml(r.status||"受付")}</span></div>`;
    $("currentCard").classList.remove("d-none");
    $("bookingForm").classList.add("d-none");
  }

  function showForm(isEdit, current) {
    $("formTitle").textContent = isEdit ? "予約を変更" : "予約枠を選択";
    $("submitBtn").textContent = isEdit ? "この内容に変更する" : "この内容で予約する";
    selectedSlot = current ? current.slotId : null;
    $("remarks").value = current ? current.remarks : "";
    renderSlots(current ? current.slotId : null);
    $("bookingForm").classList.remove("d-none");
    $("currentCard").classList.add("d-none");
    updateSubmit();
  }

  function renderSlots(preselect) {
    const box = $("slots"); box.innerHTML = "";
    const slots = (STATE.slots || []);
    if (!slots.length) { $("noSlots").classList.remove("d-none"); return; }
    $("noSlots").classList.add("d-none");
    slots.forEach(s => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "btn btn-outline-secondary slot-btn" + (s.slotId === preselect ? " active" : "");
      b.textContent = `${fmtDate(s.date)}  ${s.time}`;
      b.addEventListener("click", () => {
        selectedSlot = s.slotId;
        [...box.children].forEach(c => c.classList.remove("active"));
        b.classList.add("active");
        updateSubmit();
      });
      box.appendChild(b);
    });
  }

  function updateSubmit() { $("submitBtn").disabled = !selectedSlot; }

  function escapeHtml(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  $("editBtn").addEventListener("click", () => showForm(true, STATE.myReservation));

  $("adminBtn").addEventListener("click", () => {
    const url = new URL("../admin/", window.location.href).href;
    if (window.liff && liff.openWindow) liff.openWindow({ url: url, external: false });
    else window.open(url, "_blank");
  });

  $("cancelBtn").addEventListener("click", async () => {
    if (!confirm("予約を取り消しますか？この操作は元に戻せません。")) return;
    try {
      const d = await api({ action: "cancel", userId: PROFILE.userId, idToken: liff.getIDToken() });
      if (d.ok) { setStatus("予約を取り消しました。もう一度予約できます。", "ok"); await refresh(); }
      else alert("❌ " + (d.error || "取消に失敗しました"));
    } catch (e) { alert("❌ 通信エラー: " + (e && e.message ? e.message : e)); }
  });

  $("bookingForm").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const out = $("result"), btn = $("submitBtn");
    if (!selectedSlot) { out.className="mt-3 small text-danger"; out.textContent="枠を選択してください。"; return; }
    btn.disabled = true; out.className = "mt-3 small text-muted"; out.textContent = "送信中…";
    try {
      const data = await api({
        action: "book", userId: PROFILE.userId, idToken: liff.getIDToken(),
        slotId: selectedSlot, remarks: $("remarks").value
      });
      if (data.ok) {
        out.className = "mt-3 small text-success fw-semibold";
        out.textContent = data.updated ? "✅ 予約を変更しました。" : "✅ 予約を受け付けました。";
        await refresh();
      } else {
        out.className = "mt-3 small text-danger";
        out.textContent = "❌ " + (data.error || "予約に失敗しました");
        if (/埋まりました|選択できません/.test(data.error||"")) await refresh();
      }
    } catch (e) {
      out.className = "mt-3 small text-danger";
      out.textContent = "❌ 通信エラー: " + (e && e.message ? e.message : e);
    } finally { btn.disabled = false; }
  });

  main();
</script>
</body>
</html>
