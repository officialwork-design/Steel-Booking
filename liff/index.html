<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>スチール予約</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background:#f5f6f8; }
  .wrap { max-width: 480px; }
  .btn-line { background:#06c755; border-color:#06c755; color:#fff; }
  .btn-line:hover { background:#05b34c; border-color:#05b34c; color:#fff; }
  .avatar { width:44px; height:44px; object-fit:cover; }
  .slot-btn { text-align:left; }
  .slot-btn.active { background:#06c755; border-color:#06c755; color:#fff; }
  .rules { white-space:pre-wrap; font-size:.9rem; }
</style>
</head>
<body>
<div class="wrap container py-4">
  <h1 class="h4 fw-bold mb-3">スチール予約</h1>

  <div id="status" class="alert alert-secondary py-2 px-3 mb-3" style="white-space:pre-wrap;">読み込み中…</div>

  <div id="profile" class="d-none align-items-center gap-2 mb-3">
    <img id="avatar" class="avatar rounded-circle" alt="">
    <div>
      <div class="fw-semibold" id="dispName"></div>
      <div class="text-muted small" id="dispSub"></div>
    </div>
  </div>

  <div id="adminBar" class="d-none mb-3">
    <button id="adminBtn" class="btn btn-dark btn-sm w-100">🔧 管理画面を開く</button>
  </div>

  <div id="rulesCard" class="card border-0 shadow-sm mb-3 d-none">
    <div class="card-body">
      <div class="fw-semibold mb-2">📋 ルール・注意事項</div>
      <div id="rules" class="rules text-body-secondary"></div>
    </div>
  </div>

  <!-- 予約一覧（0〜2件） -->
  <div id="resvList" class="mb-2"></div>

  <!-- 新規予約ボタン -->
  <button id="addBtn" class="btn btn-line w-100 py-2 fw-semibold mb-3 d-none">＋ 新しく予約する</button>

  <!-- 予約フォーム（新規/変更共用） -->
  <form id="bookingForm" class="d-none card border-0 shadow-sm">
    <div class="card-body">
      <div id="formTitle" class="fw-semibold mb-2">予約枠を選択</div>
      <label class="form-label small text-muted">日時 <span class="text-danger">*</span></label>
      <div id="slots" class="d-grid gap-2 mb-3"></div>
      <div id="noSlots" class="text-muted small d-none mb-3">現在、予約できる空き枠がありません。</div>

      <label for="remarks" class="form-label fw-semibold">備考（使用する衣装を記入）<span class="text-danger">*</span></label>
      <textarea id="remarks" class="form-control" rows="3" placeholder="使用する衣装を記入してください（例：ドレス／制服 など）"></textarea>
      <div class="form-text mb-3">※どの衣装を使うか必ずご記入ください。</div>

      <div class="d-flex gap-2">
        <button id="submitBtn" type="submit" class="btn btn-line flex-grow-1 py-2 fw-semibold" disabled>予約する</button>
        <button id="cancelFormBtn" type="button" class="btn btn-outline-secondary">やめる</button>
      </div>
      <div id="result" class="mt-3 small"></div>
    </div>
  </form>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  // ▼▼▼ 書き換えるのはこの2つだけ ▼▼▼
  const CONFIG = {
    LIFF_ID: "2010792348-o9YZUyTV",
    GAS_ENDPOINT: "https://script.google.com/macros/s/AKfycbzCZMp7K4BcvoL4Jxd1SC1aB1LXtWT2eSbONSokii6mXVLUfIAMIkWPVI4-Fb7PPsWw7A/exec"
  };
  // ▲▲▲ ここだけ ▲▲▲

  const $ = (id) => document.getElementById(id);
  const setStatus = (msg, kind) => {
    const el = $("status");
    el.textContent = msg;
    el.className = "alert py-2 px-3 mb-3 " +
      (kind === "ok" ? "alert-success" : kind === "err" ? "alert-danger" : "alert-secondary");
    el.style.whiteSpace = "pre-wrap";
  };
  const wdays = ["日","月","火","水","木","金","土"];
  const fmtDate = (d) => {
    const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(d);
    if (!m) return d;
    const dt = new Date(+m[1], +m[2]-1, +m[3]);
    return `${+m[2]}/${+m[3]}(${wdays[dt.getDay()]})`;
  };
  const esc = (s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  let PROFILE = null, STATE = null, editingSlotId = null;
  let selected = new Set();   // 選択中の枠ID（新規は複数、変更は1つ）
  let maxSelectable = 1;      // 今選べる上限

  async function api(payload) {
    const res = await fetch(CONFIG.GAS_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  async function main() {
    try {
      setStatus("LIFF 初期化中…");
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (!liff.isLoggedIn()) {
        setStatus("LINEログインへ移動します…");
        liff.login({ redirectUri: window.location.origin + window.location.pathname });
        return;
      }
      PROFILE = await liff.getProfile();
      $("avatar").src = PROFILE.pictureUrl || "";
      await refresh();
    } catch (e) {
      setStatus("初期化エラー:\n" + (e && e.message ? e.message : e), "err");
    }
  }

  async function refresh() {
    setStatus("読み込み中…");
    const data = await api({ action: "init", userId: PROFILE.userId, displayName: PROFILE.displayName, idToken: liff.getIDToken() });
    if (!data.ok) { setStatus("エラー: " + (data.error || "不明"), "err"); return; }
    STATE = data;

    if (data.rules) { $("rules").textContent = data.rules; $("rulesCard").classList.remove("d-none"); }

    if (!data.registered) {
      $("dispName").textContent = data.name || PROFILE.displayName || "";
      $("dispSub").textContent = "利用停止中";
      $("profile").classList.remove("d-none"); $("profile").classList.add("d-flex");
      setStatus("現在ご利用いただけません。お手数ですが管理者にお問い合わせください。", "err");
      return;
    }

    $("dispName").textContent = data.name || PROFILE.displayName || "";
    $("dispSub").textContent = data.isAdmin ? "登録済み（管理者）" : "登録済み";
    $("profile").classList.remove("d-none"); $("profile").classList.add("d-flex");
    if (data.isAdmin) $("adminBar").classList.remove("d-none");

    // フォームは閉じた状態に
    hideForm();
    renderReservations();

    const count = (STATE.myReservations || []).length;
    const max = STATE.maxReservations || 2;
    if (count === 0) setStatus("下の「新しく予約する」から予約してください。", "ok");
    else if (count < max) setStatus(`予約は${count}件です（あと${max - count}件まで追加できます）。`, "ok");
    else setStatus(`予約は${count}件です（上限）。変更・取消はこちらから。`, "ok");
  }

  function renderReservations() {
    const list = $("resvList");
    const resvs = STATE.myReservations || [];
    list.innerHTML = resvs.map((r, i) => `
      <div class="card border-0 shadow-sm mb-2"><div class="card-body py-3">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="fs-5 fw-bold">${fmtDate(r.date)} ${esc(r.time)}</div>
            ${r.remarks ? `<div class="text-muted small mt-1">備考: ${esc(r.remarks)}</div>` : ""}
            <div class="mt-1"><span class="badge text-bg-success">${esc(r.status||"受付")}</span></div>
          </div>
        </div>
        <div class="mt-2">
          ${r.locked
            ? `<div class="alert alert-warning py-2 px-3 mb-0 small">当日以降は変更・取消できません。<br>変更が必要な場合はLINEの個人グループにご連絡ください。</div>`
            : `<button class="btn btn-outline-secondary btn-sm" data-edit="${esc(r.slotId)}">変更</button>
               <button class="btn btn-outline-danger btn-sm ms-1" data-cancel="${esc(r.slotId)}">取り消す</button>`}
        </div>
      </div></div>`).join("");

    const count = resvs.length, max = STATE.maxReservations || 2;
    $("addBtn").classList.toggle("d-none", !(count < max));
  }

  function showForm(editReservation) {
    editingSlotId = editReservation ? editReservation.slotId : null;
    selected = new Set();
    const count = (STATE.myReservations || []).length;
    const max = STATE.maxReservations || 2;

    if (editReservation) {
      maxSelectable = 1; // 変更は1枠だけ選び直す
      selected.add(editReservation.slotId);
      $("formTitle").textContent = "予約を変更（日時を1つ選び直す）";
      $("submitBtn").textContent = "この内容に変更する";
      $("remarks").value = editReservation.remarks || "";
    } else {
      maxSelectable = Math.max(1, max - count); // 残り枠まで複数選択OK
      $("formTitle").textContent = maxSelectable > 1
        ? `新しく予約（日時を最大${maxSelectable}つまで選べます）`
        : "新しく予約（日時を選ぶ）";
      $("submitBtn").textContent = "この内容で予約する";
      $("remarks").value = "";
    }

    // 選べる枠 = 空き枠 ＋（変更中ならその予約枠を先頭に）
    let slots = (STATE.slots || []).slice();
    if (editReservation && !slots.some(s => s.slotId === editReservation.slotId)) {
      slots.unshift({ slotId: editReservation.slotId, date: editReservation.date, time: editReservation.time });
    }
    renderSlots(slots);

    $("bookingForm").classList.remove("d-none");
    $("addBtn").classList.add("d-none");
    updateSubmit();
    $("result").textContent = "";
  }

  function hideForm() {
    $("bookingForm").classList.add("d-none");
    editingSlotId = null; selected = new Set();
  }

  function renderSlots(slots) {
    const box = $("slots"); box.innerHTML = "";
    if (!slots.length) { $("noSlots").classList.remove("d-none"); return; }
    $("noSlots").classList.add("d-none");
    slots.forEach(s => {
      const b = document.createElement("button");
      b.type = "button";
      b.dataset.slot = s.slotId;
      b.className = "btn btn-outline-secondary slot-btn" + (selected.has(s.slotId) ? " active" : "");
      b.textContent = `${fmtDate(s.date)}  ${s.time}`;
      b.addEventListener("click", () => {
        if (selected.has(s.slotId)) {
          selected.delete(s.slotId);
        } else {
          if (maxSelectable === 1) selected.clear();       // 変更・単数時は入れ替え
          if (selected.size >= maxSelectable) {
            if (maxSelectable === 1) { /* clear済み */ }
            else { alert(`選べるのは${maxSelectable}枠までです。`); return; }
          }
          selected.add(s.slotId);
        }
        [...box.children].forEach(c => c.classList.toggle("active", selected.has(c.dataset.slot)));
        updateSubmit();
      });
      box.appendChild(b);
    });
  }

  function updateSubmit() {
    $("submitBtn").disabled = selected.size < 1;
  }

  // 予約一覧のボタン（委任）
  $("resvList").addEventListener("click", async (e) => {
    const t = e.target;
    if (t.dataset.edit) {
      const r = (STATE.myReservations||[]).find(x => x.slotId === t.dataset.edit);
      if (r) showForm(r);
    } else if (t.dataset.cancel) {
      if (!confirm("この予約を取り消しますか？")) return;
      const d = await api({ action: "cancel", userId: PROFILE.userId, slotId: t.dataset.cancel, idToken: liff.getIDToken() });
      if (d.ok) { await refresh(); } else alert("❌ " + (d.error || "取消に失敗しました"));
    }
  });

  $("addBtn").addEventListener("click", () => showForm(null));
  $("cancelFormBtn").addEventListener("click", () => { hideForm(); renderReservations(); });

  $("adminBtn").addEventListener("click", () => {
    const url = "https://liff.line.me/" + CONFIG.LIFF_ID + "/admin/";
    if (window.liff && liff.openWindow) liff.openWindow({ url: url, external: false });
    else window.open(url, "_blank");
  });

  $("bookingForm").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const out = $("result"), btn = $("submitBtn");
    if (selected.size < 1) { out.className="mt-3 small text-danger"; out.textContent="枠を選択してください。"; return; }
    if (!$("remarks").value.trim()) { out.className="mt-3 small text-danger"; out.textContent="備考欄に、使用する衣装を記入してください。"; return; }
    btn.disabled = true; out.className = "mt-3 small text-muted"; out.textContent = "送信中…";
    try {
      let payload;
      if (editingSlotId) {
        payload = { action: "book", userId: PROFILE.userId, idToken: liff.getIDToken(),
                    slotId: [...selected][0], editSlotId: editingSlotId, remarks: $("remarks").value };
      } else {
        payload = { action: "bookMulti", userId: PROFILE.userId, idToken: liff.getIDToken(),
                    slotIds: [...selected], remarks: $("remarks").value };
      }
      const data = await api(payload);
      if (data.ok) {
        out.className = "mt-3 small text-success fw-semibold";
        out.textContent = data.updated ? "✅ 予約を変更しました。" : "✅ 予約を受け付けました。";
        await refresh();
      } else {
        out.className = "mt-3 small text-danger";
        out.textContent = "❌ " + (data.error || "予約に失敗しました");
        if (/埋まりました|選択できません|終了しました/.test(data.error||"")) await refresh();
      }
    } catch (e) {
      out.className = "mt-3 small text-danger";
      out.textContent = "❌ 通信エラー: " + (e && e.message ? e.message : e);
    } finally { btn.disabled = false; }
  });

  main();
</script>
</body>
</html>
