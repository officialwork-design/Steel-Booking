<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>スチール予約</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background:#f5f6f8; }
  .wrap { max-width: 480px; }
  .btn-line { background:#06c755; border-color:#06c755; color:#fff; }
  .btn-line:hover { background:#05b34c; border-color:#05b34c; color:#fff; }
  .avatar { width:48px; height:48px; object-fit:cover; }
  .req { color:#dc3545; font-size:.8rem; font-weight:400; }
</style>
</head>
<body>
<div class="wrap container py-4">
  <h1 class="h4 fw-bold mb-3">スチール予約</h1>

  <div id="status" class="alert alert-secondary py-2 px-3 mb-3" style="white-space:pre-wrap;">読み込み中…</div>

  <div id="profile" class="d-none align-items-center gap-2 mb-3">
    <img id="avatar" class="avatar rounded-circle" alt="">
    <div>
      <div class="fw-semibold" id="displayName"></div>
      <div class="text-muted small text-break" id="userId"></div>
    </div>
  </div>

  <form id="bookingForm" class="d-none card shadow-sm border-0">
    <div class="card-body">
      <div class="mb-3">
        <label for="lineName" class="form-label fw-semibold">ライン名 <span class="req">*必須</span></label>
        <select id="lineName" class="form-select" required>
          <option value="">選択してください</option>
          <option>ラインA</option>
          <option>ラインB</option>
          <option>ラインC</option>
        </select>
      </div>
      <div class="row g-2">
        <div class="col-7 mb-3">
          <label for="date" class="form-label fw-semibold">希望日 <span class="req">*必須</span></label>
          <input type="date" id="date" class="form-control" required>
        </div>
        <div class="col-5 mb-3">
          <label for="time" class="form-label fw-semibold">希望時間 <span class="req">*必須</span></label>
          <input type="time" id="time" class="form-control" required>
        </div>
      </div>
      <div class="mb-3">
        <label for="remarks" class="form-label fw-semibold">備考</label>
        <textarea id="remarks" class="form-control" rows="3" placeholder="ご要望など（任意）"></textarea>
      </div>
      <button id="submitBtn" type="submit" class="btn btn-line w-100 py-2 fw-semibold">この内容で予約する</button>
      <div id="result" class="mt-3 small"></div>
    </div>
  </form>

  <details class="mt-4 text-muted small">
    <summary>設定値（書き換えるのはこの2箇所）</summary>
    <pre id="configView" class="bg-white border rounded p-2 mt-2"></pre>
  </details>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  // ▼▼▼ 書き換えるのはこの2つだけ ▼▼▼
  const CONFIG = {
    LIFF_ID: "2010792348-o9YZUyTV",
    GAS_ENDPOINT: "https://script.google.com/macros/s/AKfycbzCZMp7K4BcvoL4Jxd1SC1aB1LXtWT2eSbONSokii6mXVLUfIAMIkWPVI4-Fb7PPsWw7A/exec"
  };
  // ▲▲▲ ここだけ ▲▲▲

  const $ = (id) => document.getElementById(id);
  const setStatus = (msg, kind) => {
    const el = $("status");
    el.textContent = msg;
    el.className = "alert py-2 px-3 mb-3 " +
      (kind === "ok" ? "alert-success" : kind === "err" ? "alert-danger" : "alert-secondary");
    el.style.whiteSpace = "pre-wrap";
  };
  $("configView").textContent = JSON.stringify(CONFIG, null, 2);

  let PROFILE = null;

  async function main() {
    if (!CONFIG.LIFF_ID || CONFIG.LIFF_ID.startsWith("PUT_")) {
      setStatus("LIFF_ID が未設定です。", "err"); return;
    }
    try {
      setStatus("LIFF 初期化中…");
      // 外部ブラウザでも自動でログインを処理させ、無限ループを防ぐ
      await liff.init({ liffId: CONFIG.LIFF_ID, withLoginOnExternalBrowser: true });

      if (!liff.isLoggedIn()) {
        // redirectUri を現在URLに固定してループを防止（liff.state の欠落対策）
        setStatus("LINEログインへ移動します…");
        liff.login({ redirectUri: window.location.href });
        return;
      }

      PROFILE = await liff.getProfile();
      $("avatar").src = PROFILE.pictureUrl || "";
      $("displayName").textContent = PROFILE.displayName || "(名前なし)";
      $("userId").textContent = PROFILE.userId;
      $("profile").classList.remove("d-none");
      $("profile").classList.add("d-flex");

      setStatus("ログインできました。下のフォームから予約してください。", "ok");
      $("bookingForm").classList.remove("d-none");
      $("date").min = new Date().toISOString().slice(0, 10);
    } catch (e) {
      setStatus("LIFF初期化エラー:\n" + (e && e.message ? e.message : e), "err");
    }
  }

  $("bookingForm").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const out = $("result"), btn = $("submitBtn");
    if (CONFIG.GAS_ENDPOINT.startsWith("PUT_")) {
      out.className = "mt-3 small text-danger";
      out.textContent = "⚠ GAS_ENDPOINT が未設定です。"; return;
    }
    const payload = {
      action: "create",
      idToken: liff.getIDToken(),
      userId: PROFILE ? PROFILE.userId : "",
      displayName: PROFILE ? PROFILE.displayName : "",
      lineName: $("lineName").value,
      date: $("date").value,
      time: $("time").value,
      remarks: $("remarks").value
    };
    btn.disabled = true;
    out.className = "mt-3 small text-muted";
    out.textContent = "送信中…";
    try {
      const res = await fetch(CONFIG.GAS_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.ok) {
        out.className = "mt-3 small text-success fw-semibold";
        out.textContent = "✅ 予約を受け付けました（受付番号: " + data.id + "）";
        $("bookingForm").reset();
        $("date").min = new Date().toISOString().slice(0, 10);
      } else {
        out.className = "mt-3 small text-danger";
        out.textContent = "❌ 予約に失敗しました: " + (data.error || "不明なエラー");
      }
    } catch (e) {
      out.className = "mt-3 small text-danger";
      out.textContent = "❌ 通信エラー: " + (e && e.message ? e.message : e);
    } finally {
      btn.disabled = false;
    }
  });

  main();
</script>
</body>
</html>
