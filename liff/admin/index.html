<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>スチール予約 管理画面</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body{ background:#f5f6f8; }
  .wrap{ max-width:560px; }
  .mono{ font-family:ui-monospace,monospace; font-size:.72rem; word-break:break-all; }
  .btn-line{ background:#06c755; border-color:#06c755; color:#fff; }
  .btn-line:hover{ background:#05b34c; color:#fff; }
  .nav-pills .nav-link{ padding:.35rem .5rem; font-size:.85rem; }
  .nav-pills .nav-link.active{ background:#06c755; }
  .stack .card{ border:0; }
  .tag{ font-size:.72rem; }
  textarea,input,select,.btn{ font-size:16px; } /* iOSのズーム防止 */
</style>
</head>
<body>
<div class="wrap container py-3 px-3">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h1 class="h5 fw-bold mb-0">管理画面</h1>
    <a href="https://liff.line.me/2010792348-o9YZUyTV" class="btn btn-line btn-sm">📱 予約画面</a>
  </div>
  <div id="msg" class="small text-muted mb-2">LINE認証中…</div>

  <div id="panel" class="d-none">
  <ul class="nav nav-pills nav-fill flex-nowrap mb-3 gap-1" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#t-resv">予約</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#t-users">ユーザー</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#t-slots">枠</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#t-rules">ルール</button></li>
  </ul>

  <div class="d-flex justify-content-end mb-2">
    <button id="reload" class="btn btn-outline-dark btn-sm">再読み込み</button>
  </div>

  <div class="tab-content">
    <!-- 予約 -->
    <div class="tab-pane fade show active" id="t-resv">
      <div id="resvList" class="stack"></div>
    </div>

    <!-- ユーザー -->
    <div class="tab-pane fade" id="t-users">
      <div class="card border-0 shadow-sm mb-3"><div class="card-body">
        <div class="fw-semibold mb-2">ユーザー追加 / 更新</div>
        <input id="uUserId" class="form-control mb-2" placeholder="LINE userId">
        <input id="uName" class="form-control mb-2" placeholder="表示名">
        <div class="form-check mb-2"><input id="uAdmin" class="form-check-input" type="checkbox"><label class="form-check-label" for="uAdmin">管理者として登録</label></div>
        <button id="uSave" class="btn btn-primary w-100">保存</button>
        <div class="form-text">userIdは本人が予約画面を開くと「ユーザーID: …」と表示されます。</div>
      </div></div>
      <div id="usersList" class="stack"></div>
    </div>

    <!-- 枠 -->
    <div class="tab-pane fade" id="t-slots">
      <div class="card border-0 shadow-sm mb-3"><div class="card-body">
        <div class="fw-semibold mb-2">枠を追加（1件）</div>
        <input id="sDate" type="date" class="form-control mb-2">
        <input id="sTime" type="time" class="form-control mb-2">
        <button id="sSave" class="btn btn-primary w-100">枠を追加</button>
      </div></div>
      <div class="card border-0 shadow-sm mb-3"><div class="card-body">
        <div class="fw-semibold mb-2">期間でまとめて追加</div>
        <label class="form-label small mb-0">開始日</label>
        <input id="bStart" type="date" class="form-control mb-2">
        <label class="form-label small mb-0">終了日</label>
        <input id="bEnd" type="date" class="form-control mb-2">
        <label class="form-label small mb-0">時間（カンマ区切り）</label>
        <input id="bTimes" class="form-control mb-2" placeholder="13:00,15:00,17:00">
        <button id="bSave" class="btn btn-primary w-100">一括追加</button>
        <div class="form-text">各日に指定時間の枠を作成（既存の同一枠はスキップ）。</div>
      </div></div>
      <div id="slotsList" class="stack"></div>
    </div>

    <!-- ルール -->
    <div class="tab-pane fade" id="t-rules">
      <div class="card border-0 shadow-sm"><div class="card-body">
        <div class="fw-semibold mb-2">アプリに表示するルール</div>
        <textarea id="rules" class="form-control mb-2" rows="8" placeholder="ここに書いた内容が予約画面に表示されます。"></textarea>
        <button id="rSave" class="btn btn-primary w-100">ルールを保存</button>
        <div id="rMsg" class="small mt-2"></div>
      </div></div>
    </div>
  </div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const CONFIG = {
    LIFF_ID: "2010792348-o9YZUyTV",
    GAS_ENDPOINT: "https://script.google.com/macros/s/AKfycbzCZMp7K4BcvoL4Jxd1SC1aB1LXtWT2eSbONSokii6mXVLUfIAMIkWPVI4-Fb7PPsWw7A/exec"
  };
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const setMsg = (t, k) => { const m=$("msg"); m.textContent=t; m.className="small mb-2 "+(k==="ok"?"text-success":k==="err"?"text-danger":"text-muted"); };

  async function post(payload) {
    const token = (window.liff && liff.getAccessToken) ? liff.getAccessToken() : null;
    const res = await fetch(CONFIG.GAS_ENDPOINT, {
      method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify(Object.assign({ accessToken: token }, payload))
    });
    return res.json();
  }

  async function boot() {
    try {
      setMsg("LINE認証中…");
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (!liff.isLoggedIn()) { setMsg("LINEログインへ移動します…"); liff.login({ redirectUri: window.location.origin + window.location.pathname }); return; }
      await load();
    } catch (e) { setMsg("認証エラー: " + (e && e.message ? e.message : e), "err"); }
  }

  async function load() {
    setMsg("読み込み中…");
    try {
      const data = await post({ action: "admin_list" });
      if (!data.ok) {
        $("panel").classList.add("d-none");
        setMsg("❌ " + (data.error || "取得失敗") + "（管理者アカウントでLINEから開いてください）", "err");
        return;
      }
      $("panel").classList.remove("d-none");
      renderResv(data.reservations); renderUsers(data.users); renderSlots(data.slots);
      $("rules").value = data.rules || "";
      setMsg(`予約 ${data.reservations.length} / ユーザー ${data.users.length} / 枠 ${data.slots.length}`, "ok");
    } catch (e) { setMsg("❌ 通信エラー: " + (e.message||e), "err"); }
  }

  function renderResv(rows) {
    $("resvList").innerHTML = rows.length ? rows.map(r => `
      <div class="card shadow-sm mb-2"><div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="fw-bold">${esc(r.name)||'(名前未設定)'}</div>
            ${r.lineName && r.lineName!==r.name ? `<div class="text-muted small">LINE名: ${esc(r.lineName)}</div>`:''}
          </div>
          <button class="btn btn-sm btn-outline-danger" data-del-resv="${esc(r.userId)}" data-slot="${esc(r.slotId)}">削除</button>
        </div>
        <div class="fs-6">${esc(r.date)} ${esc(r.time)}</div>
        ${r.remarks?`<div class="small text-muted mt-1">備考: ${esc(r.remarks)}</div>`:''}
        <div class="d-flex align-items-center gap-2 mt-2">
          <span class="small text-muted">状態</span>
          <select class="form-select form-select-sm w-auto" data-status-user="${esc(r.userId)}">
            ${["受付","確定","完了"].map(o=>`<option ${r.status===o?"selected":""}>${o}</option>`).join("")}
          </select>
        </div>
        <div class="small text-muted mt-1">受付: ${esc(r.receivedAt)}</div>
      </div></div>`).join("") : '<div class="text-center text-muted py-4">予約なし</div>';
  }

  function renderUsers(rows) {
    $("usersList").innerHTML = rows.length ? rows.map(u => `
      <div class="card shadow-sm mb-2"><div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-start">
          <div class="me-2">
            <div class="fw-semibold">${esc(u.name)||'(名前未設定)'}</div>
            ${u.lineName?`<div class="text-muted small">LINE名: ${esc(u.lineName)}</div>`:''}
            <div class="mono text-muted">${esc(u.userId)}</div>
          </div>
          <div class="text-end flex-shrink-0">
            ${u.admin?'<span class="badge text-bg-dark tag">管理者</span>':'<span class="badge text-bg-light border tag">一般</span>'}
            <span class="badge ${u.active?'text-bg-success':'text-bg-secondary'} tag">${u.active?'有効':'無効'}</span>
          </div>
        </div>
        <div class="d-flex flex-wrap gap-1 mt-2">
          <button class="btn btn-sm btn-outline-dark" data-toggle-admin="${esc(u.userId)}" data-admin="${u.admin}">${u.admin?'管理者解除':'管理者に'}</button>
          <button class="btn btn-sm btn-outline-secondary" data-toggle-user="${esc(u.userId)}" data-active="${u.active}">${u.active?'無効化':'有効化'}</button>
          <button class="btn btn-sm btn-outline-danger" data-del-user="${esc(u.userId)}">削除</button>
        </div>
      </div></div>`).join("") : '<div class="text-center text-muted py-4">ユーザーなし</div>';
  }

  function renderSlots(rows) {
    $("slotsList").innerHTML = rows.length ? rows.map(s => `
      <div class="card shadow-sm mb-2"><div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="fw-semibold">${esc(s.date)} ${esc(s.time)}</div>
            <div class="mt-1">
              ${s.taken?'<span class="badge text-bg-warning tag">予約済み</span>':'<span class="badge text-bg-light border tag">空き</span>'}
              ${s.past?'<span class="badge text-bg-secondary tag">過去</span>':''}
              <span class="badge ${s.active?'text-bg-success':'text-bg-secondary'} tag">${s.active?'有効':'無効'}</span>
            </div>
          </div>
        </div>
        <div class="d-flex flex-wrap gap-1 mt-2">
          <button class="btn btn-sm btn-outline-secondary" data-toggle-slot="${esc(s.slotId)}" data-date="${esc(s.date)}" data-time="${esc(s.time)}" data-active="${s.active}">${s.active?'無効化':'有効化'}</button>
          <button class="btn btn-sm btn-outline-danger" data-del-slot="${esc(s.slotId)}">削除</button>
        </div>
      </div></div>`).join("") : '<div class="text-center text-muted py-4">枠なし</div>';
  }

  document.addEventListener("click", async (e) => {
    const t = e.target;
    if (t.dataset.delResv && confirm("この予約を削除しますか？")) { await post({action:"admin_deleteReservation", userId:t.dataset.delResv, slotId:t.dataset.slot}); load(); }
    else if (t.dataset.delUser && confirm("このユーザーを削除しますか？")) { await post({action:"admin_deleteUser", userId:t.dataset.delUser}); load(); }
    else if (t.dataset.toggleUser) { await post({action:"admin_saveUser", userId:t.dataset.toggleUser, active:(t.dataset.active!=="true")}); load(); }
    else if (t.dataset.toggleAdmin) { await post({action:"admin_saveUser", userId:t.dataset.toggleAdmin, admin:(t.dataset.admin!=="true")}); load(); }
    else if (t.dataset.delSlot && confirm("この枠を削除しますか？")) { await post({action:"admin_deleteSlot", slotId:t.dataset.delSlot}); load(); }
    else if (t.dataset.toggleSlot) { await post({action:"admin_saveSlot", slotId:t.dataset.toggleSlot, date:t.dataset.date, time:t.dataset.time, active:(t.dataset.active!=="true")}); load(); }
  });

  document.addEventListener("change", async (e) => {
    const t = e.target;
    if (t.dataset.statusUser) { const r = await post({ action:"admin_setStatus", userId:t.dataset.statusUser, status:t.value }); if (!r.ok) alert("❌ " + (r.error||"失敗")); }
  });

  $("reload").addEventListener("click", load);

  $("uSave").addEventListener("click", async () => {
    if (!$("uUserId").value.trim()) { alert("userId を入力してください"); return; }
    const r = await post({ action:"admin_saveUser", userId:$("uUserId").value.trim(), name:$("uName").value.trim(), active:true, admin:$("uAdmin").checked });
    if (r.ok) { $("uUserId").value=""; $("uName").value=""; $("uAdmin").checked=false; load(); } else alert("❌ " + (r.error||"失敗"));
  });

  $("sSave").addEventListener("click", async () => {
    if (!$("sDate").value || !$("sTime").value) { alert("日付と時間を入力してください"); return; }
    const r = await post({ action:"admin_saveSlot", date:$("sDate").value, time:$("sTime").value, active:true });
    if (r.ok) { $("sTime").value=""; load(); } else alert("❌ " + (r.error||"失敗"));
  });

  $("bSave").addEventListener("click", async () => {
    const times = $("bTimes").value.split(",").map(x=>x.trim()).filter(Boolean);
    if (!$("bStart").value || !$("bEnd").value || !times.length) { alert("開始日・終了日・時間を入力してください"); return; }
    const r = await post({ action:"admin_addSlots", startDate:$("bStart").value, endDate:$("bEnd").value, times });
    if (r.ok) { alert(`${r.added}件の枠を追加しました`); $("bTimes").value=""; load(); } else alert("❌ " + (r.error||"失敗"));
  });

  $("rSave").addEventListener("click", async () => {
    const rm = $("rMsg"); rm.textContent = "保存中…"; rm.className="small mt-2 text-muted";
    const r = await post({ action:"admin_saveRules", text:$("rules").value });
    if (r.ok) { rm.textContent = "✅ 保存しました"; rm.className="small mt-2 text-success"; }
    else { rm.textContent = "❌ " + (r.error||"失敗"); rm.className="small mt-2 text-danger"; }
  });

  boot();
</script>
</body>
</html>
