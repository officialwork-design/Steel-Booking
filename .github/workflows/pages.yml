name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (liff + admin only)
        run: |
          mkdir -p site
          [ -d liff ]  && cp -r liff  site/liff  || echo "liff/ なし → スキップ"
          [ -d admin ] && cp -r admin site/admin || echo "admin/ なし → スキップ"
          [ -f site/index.html ] || printf '%s' '<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Steel Booking</title><body style="font-family:system-ui;max-width:440px;margin:40px auto;padding:0 16px;line-height:1.7"><h1 style="font-size:1.3rem">Steel Booking</h1><p><a href="https://liff.line.me/2010792348-o9YZUyTV" style="display:inline-block;background:#06c755;color:#fff;padding:12px 20px;border-radius:10px;text-decoration:none;font-weight:600">LINEで予約画面を開く</a></p><p style="color:#888;font-size:.85rem">※このボタンはLINEアプリ内で開いてください（ブラウザ直開きはログインが必要です）</p><hr><p><a href="https://liff.line.me/2010792348-o9YZUyTV/admin/">管理画面（スタッフ用・LINEで開く）</a></p>' > site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
