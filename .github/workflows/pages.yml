name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (liff + admin only)
        run: |
          mkdir -p site
          [ -d liff ]  && cp -r liff  site/liff  || echo "liff/ なし → スキップ"
          [ -d admin ] && cp -r admin site/admin || echo "admin/ なし → スキップ"
          [ -f site/index.html ] || printf '%s' '<!doctype html><meta charset="utf-8"><title>Steel Booking</title><meta http-equiv="refresh" content="0; url=./liff/"><p>Steel Booking … <a href="./liff/">予約画面へ</a></p>' > site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
