<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>スチール予約 管理画面</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style> body{background:#f5f6f8;} th{white-space:nowrap;} .mono{font-family:ui-monospace,monospace;font-size:.8rem;} .btn-line{background:#06c755;border-color:#06c755;color:#fff;} .btn-line:hover{background:#05b34c;color:#fff;} </style>
</head>
<body>
<div class="container py-4" style="max-width:1040px;">
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h1 class="h4 fw-bold mb-0">スチール予約 — 管理画面</h1>
    <a href="https://liff.line.me/2010792348-o9YZUyTV" target="_blank" rel="noopener" class="btn btn-line btn-sm">📱 予約画面を開く</a>
  </div>

  <div class="row g-2 align-items-center mb-3">
    <div class="col"><input id="key" type="password" class="form-control" placeholder="管理パスコード（ADMIN_KEY）"></div>
    <div class="col-auto"><button id="load" class="btn btn-dark">読み込み</button></div>
  </div>
  <div id="msg" class="small text-muted mb-3">パスコードを入れて「読み込み」を押してください。</div>

  <ul class="nav nav-tabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#t-resv">予約一覧</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#t-users">ユーザー</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#t-slots">予約枠</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#t-rules">ルール</button></li>
  </ul>

  <div class="tab-content pt-3">
    <!-- 予約一覧 -->
    <div class="tab-pane fade show active" id="t-resv">
      <div class="table-responsive card border-0 shadow-sm">
        <table class="table table-striped table-hover align-middle mb-0">
          <thead class="table-light"><tr><th>名前</th><th>日付</th><th>時間</th><th>備考</th><th>状態</th><th>受付</th><th></th></tr></thead>
          <tbody id="resvBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ユーザー -->
    <div class="tab-pane fade" id="t-users">
      <div class="card border-0 shadow-sm mb-3"><div class="card-body">
        <div class="fw-semibold mb-2">ユーザーを追加/更新</div>
        <div class="row g-2">
          <div class="col-md-6"><input id="uUserId" class="form-control" placeholder="LINE userId（本人がアプリに表示されるID）"></div>
          <div class="col-md-3"><input id="uName" class="form-control" placeholder="表示名"></div>
          <div class="col-md-3 d-flex align-items-center"><div class="form-check"><input id="uAdmin" class="form-check-input" type="checkbox"><label class="form-check-label" for="uAdmin">管理者として登録</label></div></div>
          <div class="col-md-6 col-lg-2 d-grid mt-2 mt-lg-0"><button id="uSave" class="btn btn-primary">保存</button></div>
        </div>
        <div class="form-text">userIdは、本人が予約画面を開くと「ユーザーID: …」と表示されます。それを登録してください。</div>
      </div></div>
      <div class="table-responsive card border-0 shadow-sm">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light"><tr><th>userId</th><th>名前</th><th>権限</th><th>有効</th><th></th></tr></thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 予約枠 -->
    <div class="tab-pane fade" id="t-slots">
      <div class="card border-0 shadow-sm mb-3"><div class="card-body">
        <div class="fw-semibold mb-2">予約枠を追加</div>
        <div class="row g-2">
          <div class="col-md-5"><input id="sDate" type="date" class="form-control"></div>
          <div class="col-md-4"><input id="sTime" type="time" class="form-control"></div>
          <div class="col-md-3 d-grid"><button id="sSave" class="btn btn-primary">枠を追加</button></div>
        </div>
      </div></div>
      <div class="table-responsive card border-0 shadow-sm">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light"><tr><th>日付</th><th>時間</th><th>状態</th><th>有効</th><th></th></tr></thead>
          <tbody id="slotsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ルール -->
    <div class="tab-pane fade" id="t-rules">
      <div class="card border-0 shadow-sm"><div class="card-body">
        <div class="fw-semibold mb-2">アプリに表示するルール・注意事項</div>
        <textarea id="rules" class="form-control mb-2" rows="8" placeholder="ここに書いた内容が予約画面に表示されます。"></textarea>
        <button id="rSave" class="btn btn-primary">ルールを保存</button>
        <span id="rMsg" class="small ms-2"></span>
      </div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ▼▼▼ 書き換えるのはここだけ ▼▼▼
  const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbzCZMp7K4BcvoL4Jxd1SC1aB1LXtWT2eSbONSokii6mXVLUfIAMIkWPVI4-Fb7PPsWw7A/exec";
  // ▲▲▲ ここだけ ▲▲▲

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const key = () => $("key").value;

  async function post(payload) {
    const res = await fetch(GAS_ENDPOINT, {
      method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify(Object.assign({ key: key() }, payload))
    });
    return res.json();
  }

  async function load() {
    const msg = $("msg");
    msg.className = "small text-muted mb-3"; msg.textContent = "読み込み中…";
    try {
      const data = await post({ action: "admin_list" });
      if (!data.ok) { msg.className="small text-danger mb-3"; msg.textContent = "❌ " + (data.error||"取得失敗"); return; }
      renderResv(data.reservations); renderUsers(data.users); renderSlots(data.slots);
      $("rules").value = data.rules || "";
      try { localStorage.setItem("sb_admin_key", key()); } catch(e){}
      msg.className="small text-success mb-3";
      msg.textContent = `読み込み完了（予約 ${data.reservations.length} / ユーザー ${data.users.length} / 枠 ${data.slots.length}）`;
    } catch (e) {
      msg.className="small text-danger mb-3"; msg.textContent = "❌ 通信エラー: " + (e.message||e);
    }
  }

  function renderResv(rows) {
    $("resvBody").innerHTML = rows.length ? rows.map(r => `<tr>
      <td>${esc(r.name)}</td><td>${esc(r.date)}</td><td>${esc(r.time)}</td>
      <td>${esc(r.remarks)}</td><td><span class="badge text-bg-success">${esc(r.status)}</span></td>
      <td class="small text-muted">${esc(r.receivedAt)}</td>
      <td><button class="btn btn-sm btn-outline-danger" data-del-resv="${esc(r.userId)}">削除</button></td>
    </tr>`).join("") : '<tr><td colspan="7" class="text-center text-muted py-4">予約なし</td></tr>';
  }

  function renderUsers(rows) {
    $("usersBody").innerHTML = rows.length ? rows.map(u => `<tr>
      <td class="mono">${esc(u.userId)}</td><td>${esc(u.name)}</td>
      <td>${u.admin?'<span class="badge text-bg-dark">管理者</span>':'<span class="badge text-bg-light border">一般</span>'}</td>
      <td><span class="badge ${u.active?'text-bg-success':'text-bg-secondary'}">${u.active?'有効':'無効'}</span></td>
      <td>
        <button class="btn btn-sm btn-outline-dark" data-toggle-admin="${esc(u.userId)}" data-admin="${u.admin}">${u.admin?'管理者解除':'管理者に'}</button>
        <button class="btn btn-sm btn-outline-secondary" data-toggle-user="${esc(u.userId)}" data-active="${u.active}">${u.active?'無効化':'有効化'}</button>
        <button class="btn btn-sm btn-outline-danger" data-del-user="${esc(u.userId)}">削除</button>
      </td>
    </tr>`).join("") : '<tr><td colspan="5" class="text-center text-muted py-4">ユーザーなし</td></tr>';
  }

  function renderSlots(rows) {
    $("slotsBody").innerHTML = rows.length ? rows.map(s => `<tr>
      <td>${esc(s.date)}</td><td>${esc(s.time)}</td>
      <td>${s.taken?'<span class="badge text-bg-warning">予約済み</span>':'<span class="badge text-bg-light border">空き</span>'}</td>
      <td><span class="badge ${s.active?'text-bg-success':'text-bg-secondary'}">${s.active?'有効':'無効'}</span></td>
      <td>
        <button class="btn btn-sm btn-outline-secondary" data-toggle-slot="${esc(s.slotId)}" data-date="${esc(s.date)}" data-time="${esc(s.time)}" data-active="${s.active}">${s.active?'無効化':'有効化'}</button>
        <button class="btn btn-sm btn-outline-danger" data-del-slot="${esc(s.slotId)}">削除</button>
      </td>
    </tr>`).join("") : '<tr><td colspan="5" class="text-center text-muted py-4">枠なし</td></tr>';
  }

  // イベント委任
  document.addEventListener("click", async (e) => {
    const t = e.target;
    if (t.dataset.delResv && confirm("この予約を削除しますか？")) { await post({action:"admin_deleteReservation", userId:t.dataset.delResv}); load(); }
    else if (t.dataset.delUser && confirm("このユーザーを削除しますか？")) { await post({action:"admin_deleteUser", userId:t.dataset.delUser}); load(); }
    else if (t.dataset.toggleUser) { await post({action:"admin_saveUser", userId:t.dataset.toggleUser, active:(t.dataset.active!=="true")}); load(); }
    else if (t.dataset.toggleAdmin) { await post({action:"admin_saveUser", userId:t.dataset.toggleAdmin, admin:(t.dataset.admin!=="true")}); load(); }
    else if (t.dataset.delSlot && confirm("この枠を削除しますか？")) { await post({action:"admin_deleteSlot", slotId:t.dataset.delSlot}); load(); }
    else if (t.dataset.toggleSlot) { await post({action:"admin_saveSlot", slotId:t.dataset.toggleSlot, date:t.dataset.date, time:t.dataset.time, active:(t.dataset.active!=="true")}); load(); }
  });

  try { const k = localStorage.getItem("sb_admin_key"); if (k) $("key").value = k; } catch(e){}
  $("load").addEventListener("click", load);
  $("key").addEventListener("keydown", e => { if (e.key==="Enter") load(); });

  $("uSave").addEventListener("click", async () => {
    if (!$("uUserId").value.trim()) { alert("userId を入力してください"); return; }
    const r = await post({ action:"admin_saveUser", userId:$("uUserId").value.trim(), name:$("uName").value.trim(), active:true, admin:$("uAdmin").checked });
    if (r.ok) { $("uUserId").value=""; $("uName").value=""; $("uAdmin").checked=false; load(); } else alert("❌ " + (r.error||"失敗"));
  });

  $("sSave").addEventListener("click", async () => {
    if (!$("sDate").value || !$("sTime").value) { alert("日付と時間を入力してください"); return; }
    const r = await post({ action:"admin_saveSlot", date:$("sDate").value, time:$("sTime").value, active:true });
    if (r.ok) { $("sTime").value=""; load(); } else alert("❌ " + (r.error||"失敗"));
  });

  $("rSave").addEventListener("click", async () => {
    const rm = $("rMsg"); rm.textContent = "保存中…"; rm.className="small ms-2 text-muted";
    const r = await post({ action:"admin_saveRules", text:$("rules").value });
    if (r.ok) { rm.textContent = "✅ 保存しました"; rm.className="small ms-2 text-success"; }
    else { rm.textContent = "❌ " + (r.error||"失敗"); rm.className="small ms-2 text-danger"; }
  });
</script>
</body>
</html>
