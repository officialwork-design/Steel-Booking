<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>スチール予約 管理画面</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style> body{background:#f5f6f8;} th{white-space:nowrap;} </style>
</head>
<body>
<div class="container py-4" style="max-width:1000px;">
  <h1 class="h4 fw-bold mb-3">スチール予約 — 管理画面</h1>

  <div class="row g-2 align-items-center mb-3">
    <div class="col">
      <input id="key" type="password" class="form-control" placeholder="パスコード（ADMIN_KEY未設定なら空でOK）">
    </div>
    <div class="col-auto">
      <button id="reload" class="btn btn-dark">再読み込み</button>
    </div>
  </div>

  <div id="msg" class="text-muted small mb-2">読み込み中…</div>

  <div class="table-responsive card shadow-sm border-0">
    <table class="table table-striped table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th>受付番号</th><th>受付日時</th><th>表示名</th><th>ライン名</th>
          <th>希望日</th><th>時間</th><th>備考</th><th>状態</th>
        </tr>
      </thead>
      <tbody id="body"></tbody>
    </table>
  </div>
</div>

<script>
  // ▼▼▼ 書き換えるのはここだけ ▼▼▼
  const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbzCZMp7K4BcvoL4Jxd1SC1aB1LXtWT2eSbONSokii6mXVLUfIAMIkWPVI4-Fb7PPsWw7A/exec";
  // ▲▲▲ ここだけ ▲▲▲

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  async function load() {
    const msg = $("msg"), body = $("body");
    body.innerHTML = "";
    if (GAS_ENDPOINT.startsWith("PUT_")) { msg.textContent = "⚠ GAS_ENDPOINT が未設定です。"; return; }
    msg.textContent = "読み込み中…";
    try {
      const url = GAS_ENDPOINT + "?action=list&key=" + encodeURIComponent($("key").value);
      const res = await fetch(url);
      const data = await res.json();
      if (!data.ok) { msg.textContent = "❌ " + (data.error || "取得に失敗しました"); return; }
      if (!data.rows.length) {
        body.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">予約はまだありません</td></tr>';
        msg.textContent = "件数: 0"; return;
      }
      msg.textContent = "件数: " + data.count;
      body.innerHTML = data.rows.map(r => `<tr>
        <td>${esc(r.id)}</td><td>${esc(r.receivedAt)}</td><td>${esc(r.displayName)}</td>
        <td>${esc(r.lineName)}</td><td>${esc(r.date)}</td><td>${esc(r.time)}</td>
        <td>${esc(r.remarks)}</td>
        <td><span class="badge text-bg-success">${esc(r.status)}</span></td>
      </tr>`).join("");
    } catch (e) {
      msg.textContent = "❌ 通信エラー: " + (e && e.message ? e.message : e);
    }
  }
  $("reload").addEventListener("click", load);
  $("key").addEventListener("keydown", (e) => { if (e.key === "Enter") load(); });
  load();
</script>
</body>
</html>
