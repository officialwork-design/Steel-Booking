<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>スチール予約 管理画面</title>
<style>
  :root { font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; }
  * { box-sizing:border-box; }
  body { margin:0; padding:20px; background:#fafafa; color:#1a1a1a; }
  .wrap { max-width: 960px; margin:0 auto; }
  h1 { font-size:1.3rem; }
  .bar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:14px 0; }
  input, button { padding:10px 12px; font-size:.95rem; border:1px solid #d4d4d8; border-radius:8px; }
  button { background:#1a1a1a; color:#fff; border:0; cursor:pointer; }
  .msg { font-size:.9rem; color:#666; margin:8px 0; }
  table { width:100%; border-collapse:collapse; background:#fff; font-size:.86rem; }
  th, td { border:1px solid #e4e4e7; padding:8px 10px; text-align:left; vertical-align:top; }
  th { background:#f4f4f5; position:sticky; top:0; }
  .status { display:inline-block; padding:2px 8px; border-radius:999px; background:#e7f6ec; color:#0a7d33; font-size:.78rem; }
  .empty { padding:24px; text-align:center; color:#999; }
</style>
</head>
<body>
<div class="wrap">
  <h1>スチール予約 — 管理画面</h1>
  <div class="bar">
    <input id="key" type="password" placeholder="パスコード（ADMIN_KEY未設定なら空でOK）" style="flex:1; min-width:220px;">
    <button id="reload">再読み込み</button>
  </div>
  <div id="msg" class="msg">読み込み中…</div>
  <table id="tbl">
    <thead>
      <tr><th>受付番号</th><th>受付日時</th><th>表示名</th><th>ライン名</th><th>希望日</th><th>時間</th><th>備考</th><th>状態</th></tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>

<script>
  // ▼▼▼ 書き換えるのはここだけ ▼▼▼
  const GAS_ENDPOINT = "PUT_YOUR_GAS_EXEC_URL_HERE"; // liffと同じ /exec URL
  // ▲▲▲ ここだけ ▲▲▲

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  async function load() {
    const msg = $("msg"), body = $("body");
    body.innerHTML = "";
    if (GAS_ENDPOINT.startsWith("PUT_")) {
      msg.textContent = "⚠ GAS_ENDPOINT が未設定です。admin/index.html の GAS_ENDPOINT を設定してください。";
      return;
    }
    msg.textContent = "読み込み中…";
    try {
      const url = GAS_ENDPOINT + "?action=list&key=" + encodeURIComponent($("key").value);
      const res = await fetch(url);
      const data = await res.json();
      if (!data.ok) { msg.textContent = "❌ " + (data.error || "取得に失敗しました"); return; }
      if (!data.rows.length) {
        body.innerHTML = '<tr><td colspan="8" class="empty">予約はまだありません</td></tr>';
        msg.textContent = "件数: 0";
        return;
      }
      msg.textContent = "件数: " + data.count;
      body.innerHTML = data.rows.map(r => `<tr>
        <td>${esc(r.id)}</td><td>${esc(r.receivedAt)}</td><td>${esc(r.displayName)}</td>
        <td>${esc(r.lineName)}</td><td>${esc(r.date)}</td><td>${esc(r.time)}</td>
        <td>${esc(r.remarks)}</td><td><span class="status">${esc(r.status)}</span></td>
      </tr>`).join("");
    } catch (e) {
      msg.textContent = "❌ 通信エラー: " + (e && e.message ? e.message : e);
    }
  }

  $("reload").addEventListener("click", load);
  $("key").addEventListener("keydown", (e) => { if (e.key === "Enter") load(); });
  load();
</script>
</body>
</html>
